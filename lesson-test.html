<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson Verification Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="lesson-test.css" />
  </head>
  <body>
    <main class="shell">
      <header class="top">
        <a id="back-link" class="button ghost" href="index.html">Back</a>
        <div>
          <p class="tag" id="track-label">Track Test</p>
          <h1 id="lesson-title">Lesson Test</h1>
        </div>
        <div class="score" id="state-pill">Quiz: Pending</div>
      </header>

      <section class="panel">
        <div class="progress-meta">
          <strong id="progress-label">Verification Progress</strong>
          <span id="progress-count">0 / 2</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </section>

      <section class="panel" id="quiz-panel">
        <h2>Part 1: Knowledge Check</h2>
        <p class="muted" id="quiz-rule">
          Answer enough questions to unlock the coding test.
        </p>
        <div id="quiz-list" class="quiz-list"></div>
        <div class="actions">
          <button id="submit-quiz" class="button" type="button">
            Submit Quiz
          </button>
        </div>
        <p id="quiz-feedback" class="feedback"></p>
      </section>

      <section class="panel is-hidden" id="code-panel">
        <h2>Part 2: Practical Task</h2>
        <p id="code-instruction">Solve the coding challenge.</p>
        <textarea id="code-input" class="code-box" rows="10"></textarea>
        <div class="actions">
          <button id="check-code" class="button" type="button">
            Check Solution
          </button>
          <button id="show-hint" class="button ghost" type="button">
            Show Hint
          </button>
        </div>
        <p id="code-feedback" class="feedback"></p>
        <div id="hint-box" class="hint-box" hidden></div>
      </section>

      <section class="panel is-hidden" id="done-panel">
        <h2>Test Passed</h2>
        <p class="muted" id="done-message">Returning to your tracker...</p>
        <div class="actions">
          <a id="done-link" class="button" href="index.html">Return to Home</a>
        </div>
      </section>
    </main>

    <script src="lesson-test.js"></script>
  </body>
</html>
